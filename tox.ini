[tox]
envlist = test, coverage, lint, format, types, docs

[testenv:test]
dependency_groups =
    test
commands =
    pytest tests \
        --durations=10 \
        --capture=no \
        {posargs}

[testenv:coverage]
dependency_groups =
    test
commands =
    coverage run -m pytest \
        --durations=0 \
        --capture=no \
        {posargs}
    coverage xml

[testenv:lint]
description = Run code linter
skip_install = True
deps = ruff
commands = ruff check src/ tests/ docs/

[testenv:format]
description = Run code formatter
skip_install = True
deps = ruff
commands = ruff format --diff src/ tests/ docs/

[testenv:types]
dependency_groups =
    types
commands =
    ty check src --output-format concise

[testenv:docs]
description = Test documentation code snippets
dependency_groups =
    test
commands =
    pytest --codeblocks docs/ {posargs}
