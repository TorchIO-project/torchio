[project]
site_name = "TorchIO"
site_url = "https://torchio.org"
site_description = "Tools for medical image processing with PyTorch"
site_author = "Fernando Pérez-García"
copyright = "Copyright &copy; 2026 Fernando Pérez-García"
repo_url = "https://github.com/TorchIO-project/torchio"
repo_name = "TorchIO-project/torchio"
edit_uri = "blob/main/docs/"

extra_javascript = [
  "javascripts/mathjax.js",
  "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
  "javascripts/copy-no-prompt.js",
]

nav = [
  { Home = "index.md" },
  { "Getting started" = "getting-started.md" },
  { Concepts = [
    "concepts/index.md",
    "concepts/data-model.md",
    "concepts/lazy-loading.md",
    "concepts/transforms.md",
  ] },
  { Tutorials = [
    "tutorials/index.md",
    "tutorials/first-pipeline.md",
    "tutorials/large-volumes.md",
    "tutorials/annotations.md",
  ] },
  { "How-to guides" = [
    "how-to/index.md",
    "how-to/dataloader.md",
    "how-to/monai.md",
    "how-to/custom-reader.md",
    "how-to/save-nii-zarr.md",
    "how-to/annotations.md",
    "how-to/visualization.md",
    "how-to/patch-inference.md",
    "how-to/patch-training.md",
    "how-to/tta.md",
  ] },
  { Reference = [
    "reference/index.md",
    { "Data structures" = [
      "reference/image.md",
      "reference/subject.md",
      "reference/points.md",
      "reference/bboxes.md",
      "reference/affine.md",
      "reference/axes.md",
    ] },
    { "Data loading" = [
      "reference/loader.md",
    ] },
    { "Transforms" = [
      "reference/transforms.md",
      "reference/parameter_range.md",
      { "Composition" = [
        "reference/transforms/compose.md",
        "reference/transforms/one_of.md",
        "reference/transforms/some_of.md",
      ] },
      { "Spatial" = [
        "reference/transforms/spatial.md",
        "reference/transforms/resample.md",
        "reference/transforms/affine_transform.md",
        "reference/transforms/elastic_deformation.md",
        "reference/transforms/flip.md",
        "reference/transforms/reorient.md",
        "reference/transforms/crop.md",
        "reference/transforms/pad.md",
        "reference/transforms/crop_or_pad.md",
      ] },
      { "Intensity" = [
        "reference/transforms/bias_field.md",
        "reference/transforms/noise.md",
        "reference/transforms/normalize.md",
        "reference/transforms/standardize.md",
      ] },
      { "Other" = [
        "reference/transforms/to.md",
        "reference/transforms/monai_adapter.md",
      ] },
    ] },
    { "Visualization" = [
      "reference/visualization.md",
    ] },
    { "CLI" = [
      "reference/cli.md",
    ] },
    { "Patches" = [
      "reference/patches.md",
    ] },
  ] },
]

[project.theme]
logo = "images/torchio_logo_2048x2048.png"
favicon = "images/favicon.ico"
language = "en"

features = [
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "deep purple"
accent = "deep purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/TorchIO-project/torchio"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/torchio/"

[project.plugins.mkdocstrings.handlers.python]
inventories = [
  "https://docs.python.org/3/objects.inv",
  "https://pytorch.org/docs/stable/objects.inv",
  "https://numpy.org/doc/stable/objects.inv",
  "https://simpleitk.readthedocs.io/en/master/objects.inv",
  "https://nipy.org/nibabel/objects.inv",
]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = true
show_bases = true
show_root_heading = true
show_root_full_path = false
members_order = "source"
filters = ["!^_", "^__init__$"]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.md_in_html]
