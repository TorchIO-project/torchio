name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  pytest:
    name: Unit tests
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    runs-on: ${{ matrix.os }}
    env:
      OS: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Install tox
        run: uv tool install --python ${{ matrix.python }} --with tox-uv tox

      - name: Add local bin to path on Windows
        if: runner.os == 'Windows'
        run: echo "C:/Users/runneradmin/.local/bin" >> $GITHUB_PATH
        shell: bash

      - name: Setup test suite
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ] && [ "${{ matrix.python }}" == "3.14" ]; then
            tox_env=coverage
          else
            tox_env=pytest
          fi
          tox run -v --notest --skip-missing-interpreters false -e "$tox_env"
        shell: bash # this wouldn't work on Powershell

      # Run all tests on schedule, but only non-slow tests otherwise
      - name: Run unit tests
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ] && [ "${{ matrix.python }}" == "3.14" ]; then
            tox_env=coverage
          else
            tox_env=pytest
          fi

          if [ "${{ github.event_name }}" == "schedule" ]; then
            tox -e "$tox_env"
          else
            tox -e "$tox_env" -- -m "not slow"
          fi
        shell: bash # this wouldn't work on Powershell

      - name: Summarize coverage
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python == '3.14' }}
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse('coverage.xml').getroot()
          line_rate = float(root.attrib['line-rate']) * 100
          lines_covered = int(root.attrib['lines-covered'])
          lines_valid = int(root.attrib['lines-valid'])

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as f:
              f.write('## Coverage report\n\n')
              f.write(
                  f'- Line coverage: **{line_rate:.2f}%** '
                  f'({lines_covered}/{lines_valid} lines)\n'
              )
              f.write('- Full coverage details are uploaded to Codecov.\n')
          PY

      - name: Upload coverage reports to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python == '3.14' }}
        uses: codecov/codecov-action@v5.5.2
        with:
          files: ./coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  cli:
    name: CLI smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Test transforms CLI tool
        run: uv run -- tiotr --help

      - name: Test info CLI tool
        run: uv run -- tiohd --help
