name: X

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1)"
        required: true
      url:
        description: "Release URL"
        required: true
      body:
        description: "Release notes body (Markdown)"
        required: false

permissions:
  contents: read

jobs:
  post:
    name: Post to X
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Post release thread to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          RELEASE_URL: ${{ github.event.release.html_url || inputs.url }}
          RELEASE_BODY: ${{ github.event.release.body || inputs.body }}
        run: mise run post-to-x
