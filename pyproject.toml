[project]
name = "torchio"
version = "0.23.1"
description = "Medical image preprocessing, augmentation, and patch-based training."
requires-python = ">=3.11"
dependencies = [
    "attrs>=26.1.0",
    "einops",
    "fsspec[http]>=2026.2.0",
    "humanize>=4.15.0",
    "jaxtyping>=0.3.9",
    "loguru>=0.7.3",
    "nibabel",
    "numpy",
    "simpleitk",
    "tensordict",
    "torch>=2.0",
]

[project.urls]
Homepage = "https://torchio.org"
Source = "https://github.com/TorchIO-project/torchio"
"Issue tracker" = "https://github.com/TorchIO-project/torchio/issues"
Documentation = "https://docs.torchio.org"
"Release notes" = "https://github.com/TorchIO-project/torchio/releases"

[build-system]
requires = ["uv_build>=0.11.1,<0.12.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
addopts = ["-ra", "--strict-config", "--strict-markers"]
filterwarnings = [
    # Ignore SimpleITK Swig warnings
    "ignore:builtin type .* has no __module__ attribute",
    "ignore:Casting complex values to real discards the imaginary part",
    # Raised by SimpleITK on CI
    "ignore:invalid escape sequence",
]
log_level = "INFO"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "serial",
]
minversion = "9"
testpaths = ["tests"]
xfail_strict = true

[tool.coverage.run]
source = ["torchio"]

[tool.coverage.report]
fail_under = 100
show_missing = true
skip_empty = true

[tool.ruff]
src = ["src"]

[tool.ruff.lint]
select = [
    "A",
    "B",
    "C4",
    "E",
    "F",
    "I",
    "N",
    "PT",
    "RUF",
    "SIM",
    "UP",
    "W",
]
ignore = [
    "N813",  # https://docs.astral.sh/ruff/rules/camelcase-imported-as-lowercase/
]

[tool.ruff.lint.isort]
force-single-line = true

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "B018",  # https://docs.astral.sh/ruff/rules/useless-expression/
]
"src/torchio/data/bboxes.py" = [
    "A002",  # `format` parameter shadows builtin — canonical name for this concept
]

[tool.bump-my-version]
current_version = "0.23.1"
commit = true
tag = true

[[tool.bump-my-version.files]]
filename = "pyproject.toml"
search = 'version = "{current_version}"'
replace = 'version = "{new_version}"'

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "ipywidgets>=8.1.8",
    "nbconvert>=7.17.0",
    "rich>=14.3.3",
]
test = [
    "pytest",
    "pytest-cov",
    "pytest-sugar",
]
doc = [
    "mkdocstrings-python>=2.0.2",
    "zensical>=0.0.23",
]
quality = [
    "bump-my-version",
    "prek",
    "ruff",
    "tox-uv",
    "ty",
]
zarr = [
    "nifti-zarr>=1.0.0rc6",
]
plot = [
    "matplotlib>=3.7",
    "colorcet",
    "pillow",
]
video = [
    "ffmpeg-python>=0.2",
]
monai = [
    "monai>=1.4",
]
s3 = [
    "s3fs",
]
azure = [
    "adlfs",
]
gcs = [
    "gcsfs",
]
