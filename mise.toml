[tools]
prek = "latest"
uv = "latest"

[tasks.setup]
description = "Install all dependencies and prek hooks"
run = """
uv sync --all-groups
mise trust
mise install
prek install --install-hooks
"""

[tasks.test]
description = "Run tests with pytest"
run = "uv run tox -e test"

[tasks.lint]
description = "Lint with ruff"
run = "uv run tox -e lint"

[tasks.format]
description = "Format with ruff"
run = "uv run --group quality -- ruff format src/ tests/"

[tasks.format-check]
description = "Check formatting with ruff"
run = "uv run tox -e format"

[tasks.types]
description = "Type check with ty"
run = "uv run tox -e types"

[tasks.quality]
description = "Run all quality checks (lint, format, types)"
depends = ["lint", "format-check", "types"]

[tasks.prek]
description = "Run prek hooks on all files"
run = "uv run --group quality -- prek run --all-files"

[tasks.tox]
description = "Run all tox environments"
run = "uv run --group quality -- tox"

[tasks.bump]
description = "Bump version (usage: mise run bump -- pre_n|pre_l|patch|minor|major)"
run = "uv run -- bump-my-version bump --verbose"

[tasks.bump-dry]
description = "Dry-run version bump"
run = "uv run -- bump-my-version bump --dry-run --verbose --allow-dirty"

[tasks.deprecate-python]
description = "Remove oldest Python, update configs, run pyupgrade and ruff"
depends = ["deprecate-python-files"]
run = """
uv run --group quality -- prek run --all-files pyupgrade
uv run --group quality -- ruff check --fix src docs tests
"""

[tasks.push]
description = "Push commits and tags"
run = "git push && git push --tags"

[tasks.add-remote]
description = "Add a fork as a Git remote (usage: mise run add-remote username)"
run = 'git remote add "$1" "git@github.com:$1/torchio.git"'

[tasks."docs:serve"]
description = "Serve documentation locally"
run = "uv run --group docs -- zensical serve --open"

[tasks."docs:build"]
description = "Build documentation"
run = "uv run --group docs -- zensical build"

[tasks."docs:deploy"]
description = "Deploy a versioned docs build with mike (usage: mise run docs:deploy -- [mike-args] <version> [alias...])"
run = 'uv run --group docs-deploy -- mike deploy --update-aliases "$@"'

[tasks."docs:set-default"]
description = "Set the docs version users are redirected to (usage: mise run docs:set-default -- [mike-args] <alias>)"
run = 'uv run --group docs-deploy -- mike set-default "$@"'

[tasks."docs:test"]
description = "Test documentation code snippets"
run = "uv run tox -e docs-test"

[tasks."docs:plots"]
description = "Generate plot images from docs"
run = "uv run --group docs -- python docs/plot_directive.py"

[tasks."docs:gallery"]
description = "Generate examples gallery pages"
run = "uv run --group docs -- python docs/gallery.py"

[tasks.clean]
description = "Remove build artifacts and caches"
run = """
rm -rf .mypy_cache
rm -rf .pytest_cache
rm -rf .ruff_cache
rm -rf .tox
rm -rf dist
rm -rf site
rm -rf **/__pycache__
rm -rf src/*.egg-info
rm -f .coverage
rm -f coverage.*
"""
